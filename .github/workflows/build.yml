name: Build Vertex Desktop

on:
  push:
    # Any push to these branches → sanity-build, .exe uploaded as an artefact
    branches: [master, dev]
    # Tag like v1.2.3 → full Release with the .exe attached (and autogenerated notes)
    tags: ['v*']
  # Manual button in the Actions tab → same as a branch push
  workflow_dispatch:

# Needed for the release-publishing step to create/update a Release and attach files.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --name VertexDesktop `
            --onefile `
            --windowed `
            --icon vertex.ico `
            --add-data "ui.html;." `
            --add-data "assets;assets" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.mshtml `
            --hidden-import clr_loader `
            --hidden-import bleak.backends.winrt `
            --hidden-import bleak.backends.winrt.client `
            --hidden-import bleak.backends.winrt.scanner `
            vertex_desktop.py

      - name: Record build metadata
        shell: pwsh
        run: |
          $size = (Get-Item dist\VertexDesktop.exe).Length / 1MB
          $hash = (Get-FileHash dist\VertexDesktop.exe -Algorithm SHA256).Hash
          "VertexDesktop.exe — $('{0:N1}' -f $size) MB" | Tee-Object dist\BUILD_INFO.txt
          "SHA256: $hash" | Tee-Object -Append dist\BUILD_INFO.txt
          "Built from: $env:GITHUB_SHA" | Tee-Object -Append dist\BUILD_INFO.txt

      - name: Upload build artefact (always — for branch pushes, PRs, and dispatch runs)
        uses: actions/upload-artifact@v4
        with:
          name: VertexDesktop-${{ github.sha }}
          path: |
            dist/VertexDesktop.exe
            dist/BUILD_INFO.txt
          retention-days: 30

      # Rolling "Latest build" release — force-updated on every push to master.
      # The tag `latest` moves with each build, so the canonical download URL
      # https://github.com/BigGolfGuy22/vertex-desktop/releases/latest always
      # serves the newest .exe.
      - name: Publish rolling "latest" release (master pushes)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Auto-published from the most recent push to `master`.

            - Commit: ${{ github.sha }}
            - Built: ${{ github.event.head_commit.timestamp }}
            - Message: ${{ github.event.head_commit.message }}

            See `BUILD_INFO.txt` for size + SHA-256 of the .exe.
          files: |
            dist/VertexDesktop.exe
            dist/BUILD_INFO.txt
          draft: false
          prerelease: false
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Versioned release on tag pushes — keeps semver release history alongside
      # the rolling "latest" pointer above. `git tag v0.1.6 && git push --tags`
      # publishes a permanent release with auto-generated notes.
      - name: Publish versioned GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VertexDesktop.exe
            dist/BUILD_INFO.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
